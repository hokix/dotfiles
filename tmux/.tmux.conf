unbind C-b
set -g prefix C-x

bind r source-file ~/.tmux.conf \; display "Reloaded!"

set -g default-command zsh

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind s setw synchronize-panes on
bind S setw synchronize-panes off
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
set-window-option -g automatic-rename on
# bind / copy-mode \; send-key ?
bind t {
   run-shell 'tmux list-panes -F "#{pane_id}:#{pane_title}" | grep -q ":term$" || (tmux split-window -c "#{pane_current_path}" && tmux select-pane -T term && tmux resize-pane -D 10)'
}
bind T clock-mode
bind C-x send-prefix

set -g set-clipboard on
set -g allow-passthrough on

set-option -sg escape-time 10
set-option -g focus-events on
set-option -sa terminal-features 'XXX:RGB'
set-window-option -g mode-keys vi

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'fabioluciano/tmux-powerkit'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'tmux-plugins/tmux-yank'
# INFO: These plugins must be loaded last to take effect
# https://github.com/tmux-plugins/tmux-continuum/tree/master?tab=readme-ov-file#known-issues
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect
set -g @resurrect-strategy-nvim 'session'

# continuum
set -g @continuum-boot 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# powerkit
set -g @powerkit_plugins "datetime,battery,hostname"
set -g @powerkit_theme "catppuccin"
set -g @powerkit_theme_variant "mocha"
set -g @powerkit_status_position "bottom"
set -g @powerkit_transparent "true"
set -g @powerkit_elements_spacing "both"
set -g @powerkit_plugin_datetime_format "%m-%d %A %H:%M"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'

# set -g status-bg default
# set -g status-style "bg=default"

# Undercurl
# set -g default-terminal "${TERM}"
set -g default-terminal "${TERM}"
set -ag terminal-overrides ",${TERM}:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

if-shell "uname | grep -q Darwin" "source-file ~/.tmux-osx" "source-file ~/.tmux-linux"
